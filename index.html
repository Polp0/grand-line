<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE PIECE filler guide</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a1628;
            color: #fff;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* --- Search Panel --- */
        #search-panel {
            flex-shrink: 0;
            padding: 16px 16px 10px;
            padding-top: calc(16px + env(safe-area-inset-top, 0px));
            background: #0a1628;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        /* --- Log Pose --- */
        .log-pose {
            margin-bottom: 12px;
        }

        .log-pose-ring {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 6px;
            border: 3px solid #f4d35e;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(244,211,94,0.15), inset 0 0 15px rgba(244,211,94,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .log-pose-ring #ep-input {
            width: 60px;
            height: 60px;
            padding: 0;
            font-size: 22px;
            font-weight: 700;
            font-family: inherit;
            background: transparent;
            border: none;
            border-radius: 50%;
            color: #fff;
            text-align: center;
            outline: none;
            -moz-appearance: textfield;
        }

        .log-pose-ring #ep-input::-webkit-inner-spin-button,
        .log-pose-ring #ep-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        .log-pose-ring #ep-input::placeholder {
            color: rgba(255,255,255,0.25);
            font-weight: 400;
            font-size: 18px;
        }

        .log-pose-needle {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 10px solid #f4d35e;
            transition: transform 0.3s ease;
        }

        .log-pose-label {
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.4;
        }

        /* --- Result Card --- */
        .result-card {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 0 auto 10px;
            max-width: 320px;
            text-align: left;
        }

        .result-card.hidden {
            display: none;
        }

        .result-saga {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            margin-bottom: 4px;
        }

        .result-current {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .result-next, .result-skip {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 3px;
            cursor: pointer;
        }

        .result-next:hover, .result-skip:hover {
            opacity: 1;
        }

        .type-tag {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            vertical-align: middle;
            margin-left: 4px;
        }

        /* --- Legend --- */
        .legend {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 9px;
            opacity: 0.5;
        }

        .dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 3px;
            vertical-align: middle;
        }

        /* --- Saga Map --- */
        #saga-map {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 12px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        #saga-map::-webkit-scrollbar {
            display: none;
        }

        /* --- Saga Card --- */
        .saga-card {
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 0;
            position: relative;
            overflow: hidden;
        }

        .saga-header {
            margin-bottom: 12px;
        }

        .saga-name {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .saga-range {
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* --- Arc Section --- */
        .arc-section {
            margin-bottom: 10px;
        }

        .arc-section:last-child {
            margin-bottom: 0;
        }

        .arc-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .arc-label.filler-arc {
            opacity: 0.4;
            font-style: italic;
        }

        .arc-label.filler-arc::after {
            content: ' (filler)';
            font-weight: 400;
        }

        /* --- Episode Grid (inside arcs) --- */
        .arc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 28px);
            gap: 3px;
        }

        .cell {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: outline 0.15s;
            color: rgba(255,255,255,0.7);
        }

        .cell:active {
            transform: scale(0.92);
        }

        .cell.selected {
            outline: 2px solid #fff;
            outline-offset: 1px;
            color: #fff;
        }

        /* --- Route Line (between saga cards) --- */
        .route-line {
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .route-line::before {
            content: '';
            width: 2px;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,0.15) 0px,
                rgba(255,255,255,0.15) 4px,
                transparent 4px,
                transparent 8px
            );
        }

        /* --- Desktop --- */
        @media (min-width: 768px) {
            body {
                display: flex;
                justify-content: center;
            }

            #app {
                max-width: 480px;
                height: 100vh;
                border-left: 1px solid rgba(255,255,255,0.08);
                border-right: 1px solid rgba(255,255,255,0.08);
            }

            .saga-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <section id="search-panel">
            <div class="log-pose">
                <div class="log-pose-ring">
                    <input type="number" id="ep-input" min="1" max="1155" placeholder="#" inputmode="numeric">
                    <div class="log-pose-needle" id="log-pose-needle"></div>
                </div>
                <div class="log-pose-label">LOG POSE</div>
            </div>
            <div id="result-card" class="result-card hidden">
                <div class="result-saga" id="result-saga"></div>
                <div class="result-current" id="result-current"></div>
                <div class="result-next" id="result-next"></div>
                <div class="result-skip" id="result-skip"></div>
            </div>
            <div class="legend">
                <span class="legend-item"><span class="dot" style="background:#2d6a4f"></span>Canon</span>
                <span class="legend-item"><span class="dot" style="background:#c1121f"></span>Filler</span>
                <span class="legend-item"><span class="dot" style="background:#e9c46a"></span>Mixed</span>
                <span class="legend-item"><span class="dot" style="background:#219ebc"></span>Anime</span>
            </div>
        </section>
        <section id="saga-map"></section>
    </div>

    <script>
        // --- Episode Data Layer ---
        const CANON = 'canon';
        const FILLER = 'filler';
        const MIXED = 'mixed';
        const ANIME = 'anime';
        const TOTAL_EPISODES = 1155;

        const RANGES = [
            [1,44,CANON],[45,47,MIXED],[48,49,CANON],[50,51,ANIME],[52,53,CANON],
            [54,60,FILLER],[61,61,MIXED],[62,67,CANON],[68,69,MIXED],[70,92,CANON],
            [93,93,ANIME],[94,97,CANON],[98,99,FILLER],[100,100,CANON],[101,101,MIXED],
            [102,102,FILLER],[103,130,CANON],[131,143,FILLER],[144,195,CANON],
            [196,206,FILLER],[207,212,CANON],[213,216,ANIME],[217,219,CANON],
            [220,225,FILLER],[226,226,MIXED],[227,278,CANON],[279,283,FILLER],
            [284,290,CANON],[291,292,FILLER],[293,302,CANON],[303,303,FILLER],
            [304,316,CANON],[317,319,FILLER],[320,325,CANON],[326,336,FILLER],
            [337,353,CANON],[354,354,MIXED],[355,381,CANON],[382,384,FILLER],
            [385,405,CANON],[406,407,FILLER],[408,417,CANON],[418,420,ANIME],
            [421,421,MIXED],[422,425,CANON],[426,429,FILLER],[430,452,CANON],
            [453,456,ANIME],[457,458,FILLER],[459,488,CANON],[489,489,MIXED],
            [490,491,CANON],[492,492,FILLER],[493,496,CANON],[497,499,ANIME],
            [500,505,CANON],[506,506,ANIME],[507,519,CANON],[520,520,MIXED],
            [521,541,CANON],[542,542,FILLER],[543,573,CANON],[574,574,MIXED],
            [575,578,FILLER],[579,589,CANON],[590,590,FILLER],[591,624,CANON],
            [625,625,MIXED],[626,627,FILLER],[628,628,MIXED],[629,632,CANON],
            [633,633,MIXED],[634,652,CANON],[653,653,MIXED],[654,656,CANON],
            [657,657,MIXED],[658,678,CANON],[679,679,MIXED],[680,689,CANON],
            [690,690,MIXED],[691,730,CANON],[731,731,MIXED],[732,736,CANON],
            [737,737,ANIME],[738,738,MIXED],[739,746,CANON],[747,750,FILLER],
            [751,751,MIXED],[752,774,CANON],[775,775,ANIME],[776,776,CANON],
            [777,778,MIXED],[779,779,CANON],[780,782,FILLER],[783,788,CANON],
            [789,789,MIXED],[790,802,CANON],[803,803,MIXED],[804,806,CANON],
            [807,807,MIXED],[808,877,CANON],[878,879,MIXED],[880,880,CANON],
            [881,885,MIXED],[886,886,CANON],[887,890,MIXED],[891,894,CANON],
            [895,896,FILLER],[897,906,CANON],[907,907,FILLER],[908,923,CANON],
            [924,924,MIXED],[925,987,CANON],[988,989,MIXED],[990,990,CANON],
            [991,991,MIXED],[992,1028,CANON],[1029,1030,FILLER],[1031,1083,CANON],
            [1084,1084,ANIME],[1085,1155,CANON]
        ];

        // Build flat lookup array
        const episodes = new Array(TOTAL_EPISODES + 1);
        for (const [start, end, type] of RANGES) {
            for (let i = start; i <= end; i++) episodes[i] = type;
        }

        function nextNonFiller(ep) {
            for (let i = ep + 1; i <= TOTAL_EPISODES; i++) {
                if (episodes[i] !== FILLER) return i;
            }
            return null;
        }

        const TYPE_INFO = {
            [CANON]:  { label: 'CANON',       color: '#2d6a4f' },
            [FILLER]: { label: 'FILLER',      color: '#c1121f' },
            [MIXED]:  { label: 'MIXED',       color: '#e9c46a' },
            [ANIME]:  { label: 'ANIME CANON', color: '#219ebc' }
        };

        // --- Saga & Arc Data ---
        const SAGAS = [
            {
                name: 'East Blue',
                gradient: 'linear-gradient(135deg, rgba(33,158,188,0.2), rgba(45,106,79,0.15))',
                arcs: [
                    { name: 'Romance Dawn', start: 1, end: 3 },
                    { name: 'Orange Town', start: 4, end: 8 },
                    { name: 'Syrup Village', start: 9, end: 18 },
                    { name: 'Baratie', start: 19, end: 30 },
                    { name: 'Arlong Park', start: 31, end: 45 },
                    { name: 'Buggy Side Story', start: 46, end: 47, filler: true },
                    { name: 'Loguetown', start: 48, end: 53 },
                    { name: 'Warship Island', start: 54, end: 61, filler: true }
                ]
            },
            {
                name: 'Alabasta',
                gradient: 'linear-gradient(135deg, rgba(233,196,106,0.2), rgba(180,130,60,0.15))',
                arcs: [
                    { name: 'Reverse Mountain', start: 62, end: 63 },
                    { name: 'Whiskey Peak', start: 64, end: 67 },
                    { name: 'Koby & Helmeppo', start: 68, end: 69, filler: true },
                    { name: 'Little Garden', start: 70, end: 77 },
                    { name: 'Drum Island', start: 78, end: 91 },
                    { name: 'Alabasta', start: 92, end: 130 },
                    { name: 'Post-Alabasta', start: 131, end: 135, filler: true }
                ]
            },
            {
                name: 'Sky Island',
                gradient: 'linear-gradient(135deg, rgba(255,255,255,0.15), rgba(135,206,235,0.15), rgba(244,211,94,0.1))',
                arcs: [
                    { name: 'Goat Island', start: 136, end: 138, filler: true },
                    { name: 'Ruluka Island', start: 139, end: 143, filler: true },
                    { name: 'Jaya', start: 144, end: 152 },
                    { name: 'Skypiea', start: 153, end: 195 },
                    { name: 'G-8', start: 196, end: 206, filler: true }
                ]
            },
            {
                name: 'Water 7',
                gradient: 'linear-gradient(135deg, rgba(0,128,128,0.2), rgba(10,22,40,0.3))',
                arcs: [
                    { name: 'Long Ring Long Land', start: 207, end: 219 },
                    { name: "Ocean's Dream", start: 220, end: 224, filler: true },
                    { name: "Foxy's Return", start: 225, end: 228, filler: true },
                    { name: 'Water 7', start: 229, end: 263 },
                    { name: 'Enies Lobby', start: 264, end: 312 },
                    { name: 'Post-Enies Lobby', start: 313, end: 325 }
                ]
            },
            {
                name: 'Thriller Bark',
                gradient: 'linear-gradient(135deg, rgba(88,24,120,0.2), rgba(20,10,30,0.3))',
                arcs: [
                    { name: 'Ice Hunter', start: 326, end: 336, filler: true },
                    { name: 'Thriller Bark', start: 337, end: 381 },
                    { name: 'Spa Island', start: 382, end: 384, filler: true }
                ]
            },
            {
                name: 'Summit War',
                gradient: 'linear-gradient(135deg, rgba(193,18,31,0.2), rgba(255,140,0,0.12), rgba(20,10,10,0.3))',
                arcs: [
                    { name: 'Sabaody Archipelago', start: 385, end: 407 },
                    { name: 'Amazon Lily', start: 408, end: 421 },
                    { name: 'Impel Down', start: 422, end: 452 },
                    { name: 'Little East Blue', start: 426, end: 429, filler: true },
                    { name: 'Marineford', start: 453, end: 489 },
                    { name: 'Post-War', start: 490, end: 516 }
                ]
            },
            {
                name: 'Fish-Man Island',
                gradient: 'linear-gradient(135deg, rgba(10,30,80,0.3), rgba(0,200,200,0.12))',
                arcs: [
                    { name: 'Return to Sabaody', start: 517, end: 522 },
                    { name: 'Fish-Man Island', start: 523, end: 574 }
                ]
            },
            {
                name: 'Dressrosa',
                gradient: 'linear-gradient(135deg, rgba(200,50,100,0.18), rgba(220,170,50,0.12))',
                arcs: [
                    { name: "Z's Ambition", start: 575, end: 578, filler: true },
                    { name: 'Punk Hazard', start: 579, end: 625 },
                    { name: 'Caesar Retrieval', start: 626, end: 628, filler: true },
                    { name: 'Dressrosa', start: 629, end: 746 }
                ]
            },
            {
                name: 'Whole Cake Island',
                gradient: 'linear-gradient(135deg, rgba(255,182,193,0.18), rgba(255,228,196,0.12))',
                arcs: [
                    { name: 'Silver Mine', start: 747, end: 750, filler: true },
                    { name: 'Zou', start: 751, end: 779 },
                    { name: 'Marine Rookie', start: 780, end: 782, filler: true },
                    { name: 'Whole Cake Island', start: 783, end: 877 }
                ]
            },
            {
                name: 'Wano Country',
                gradient: 'linear-gradient(135deg, rgba(139,0,0,0.2), rgba(10,5,5,0.3), rgba(255,183,197,0.08))',
                arcs: [
                    { name: 'Levely', start: 878, end: 889 },
                    { name: 'Wano Act 1', start: 890, end: 894 },
                    { name: 'Cidre Guild', start: 895, end: 896, filler: true },
                    { name: 'Wano Act 2', start: 897, end: 958 },
                    { name: 'Wano Act 3', start: 959, end: 1085 },
                    { name: "Uta's Past", start: 1029, end: 1030, filler: true }
                ]
            },
            {
                name: 'Final Saga',
                gradient: 'linear-gradient(135deg, rgba(220,220,240,0.15), rgba(100,200,255,0.1))',
                arcs: [
                    { name: 'Egghead', start: 1086, end: 1155 }
                ]
            }
        ];

        function findSagaForEp(ep) {
            for (let i = 0; i < SAGAS.length; i++) {
                const saga = SAGAS[i];
                const firstArc = saga.arcs[0];
                const lastArc = saga.arcs[saga.arcs.length - 1];
                if (ep >= firstArc.start && ep <= lastArc.end) {
                    return { sagaIndex: i, saga };
                }
            }
            return null;
        }

        // --- Saga Map Rendering ---
        const sagaMap = document.getElementById('saga-map');
        const cells = [];
        const sagaElements = [];

        function renderSagaMap() {
            const fragment = document.createDocumentFragment();

            SAGAS.forEach((saga, sagaIndex) => {
                // Route line between cards (except before first)
                if (sagaIndex > 0) {
                    const line = document.createElement('div');
                    line.className = 'route-line';
                    fragment.appendChild(line);
                }

                // Saga card
                const card = document.createElement('div');
                card.className = 'saga-card';
                card.style.background = saga.gradient;
                card.dataset.sagaIndex = sagaIndex;

                // Header
                const firstEp = saga.arcs[0].start;
                const lastEp = saga.arcs[saga.arcs.length - 1].end;
                const totalEps = lastEp - firstEp + 1;
                card.innerHTML = `
                    <div class="saga-header">
                        <div class="saga-name">${saga.name}</div>
                        <div class="saga-range">EP ${firstEp}\u2013${lastEp} \u00b7 ${totalEps} episodes</div>
                    </div>
                `;

                // Arc sections
                saga.arcs.forEach(arc => {
                    const section = document.createElement('div');
                    section.className = 'arc-section';

                    const label = document.createElement('div');
                    label.className = 'arc-label' + (arc.filler ? ' filler-arc' : '');
                    label.textContent = arc.name;
                    section.appendChild(label);

                    const grid = document.createElement('div');
                    grid.className = 'arc-grid';

                    for (let i = arc.start; i <= arc.end; i++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.textContent = i;
                        cell.style.background = TYPE_INFO[episodes[i]].color;
                        cell.dataset.ep = i;
                        grid.appendChild(cell);
                        cells[i] = cell;
                    }

                    section.appendChild(grid);
                    card.appendChild(section);
                });

                fragment.appendChild(card);
                sagaElements[sagaIndex] = card;
            });

            sagaMap.appendChild(fragment);
        }

        renderSagaMap();

        // --- Search Panel Logic ---
        const epInput = document.getElementById('ep-input');
        const resultCard = document.getElementById('result-card');
        const resultSaga = document.getElementById('result-saga');
        const resultCurrent = document.getElementById('result-current');
        const resultNext = document.getElementById('result-next');
        const resultSkip = document.getElementById('result-skip');

        let selectedEp = null;

        function makeTag(type) {
            const info = TYPE_INFO[type];
            return `<span class="type-tag" style="background:${info.color}">${info.label}</span>`;
        }

        function selectEpisode(ep) {
            ep = parseInt(ep);
            if (isNaN(ep) || ep < 1 || ep > TOTAL_EPISODES) {
                resultCard.classList.add('hidden');
                if (selectedEp && cells[selectedEp]) cells[selectedEp].classList.remove('selected');
                selectedEp = null;
                return;
            }

            if (selectedEp && cells[selectedEp]) cells[selectedEp].classList.remove('selected');
            selectedEp = ep;
            cells[ep].classList.add('selected');

            // Show saga name
            const found = findSagaForEp(ep);
            if (found) {
                resultSaga.textContent = found.saga.name;
            }

            // Animate Log Pose needle
            const needle = document.getElementById('log-pose-needle');
            const angle = (ep / TOTAL_EPISODES) * 360 - 180;
            needle.style.transform = `translateX(-50%) rotate(${angle}deg)`;

            resultCurrent.innerHTML = `EP ${ep} ${makeTag(episodes[ep])}`;

            if (ep < TOTAL_EPISODES) {
                const next = ep + 1;
                resultNext.innerHTML = `next: EP ${next} ${makeTag(episodes[next])}`;
                resultNext.dataset.ep = next;
                resultNext.style.display = '';
            } else {
                resultNext.style.display = 'none';
            }

            const isFiller = episodes[ep] === FILLER;
            const nextIsFiller = ep < TOTAL_EPISODES && episodes[ep + 1] === FILLER;
            if (isFiller || nextIsFiller) {
                const skipTo = nextNonFiller(isFiller ? ep : ep + 1);
                if (skipTo) {
                    resultSkip.innerHTML = `skip to: EP ${skipTo} ${makeTag(episodes[skipTo])}`;
                    resultSkip.dataset.ep = skipTo;
                    resultSkip.style.display = '';
                } else {
                    resultSkip.style.display = 'none';
                }
            } else {
                resultSkip.style.display = 'none';
            }

            resultCard.classList.remove('hidden');
            cells[ep].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        epInput.addEventListener('input', () => selectEpisode(epInput.value));

        // --- Bidirectional Linking ---
        sagaMap.addEventListener('click', (e) => {
            const cell = e.target.closest('.cell');
            if (!cell) return;
            const ep = parseInt(cell.dataset.ep);
            epInput.value = ep;
            selectEpisode(ep);
        });

        resultNext.addEventListener('click', () => {
            const ep = resultNext.dataset.ep;
            if (ep) { epInput.value = ep; selectEpisode(ep); }
        });

        resultSkip.addEventListener('click', () => {
            const ep = resultSkip.dataset.ep;
            if (ep) { epInput.value = ep; selectEpisode(ep); }
        });
    </script>
</body>
</html>
